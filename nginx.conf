upstream api_server {
  server 127.0.0.1:8080;
}

server {
  listen 3000;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API requests to Express server
  location /api/ {
    proxy_pass http://api_server;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 30s;
    proxy_read_timeout 30s;
  }

  location /assets/ {
    try_files $uri =404;
  }

  location = / {
    try_files /index.html =404;
  }

  location = /admin_login {
    try_files /admin_login.html =404;
  }

  location = /official_login {
    try_files /official_login.html =404;
  }

  location = /beneficiary {
    try_files /beneficiary.html =404;
  }

  location = /beneficiary_register {
    try_files /beneficiary_register.html =404;
  }

  location = /peso_officer {
    try_files /peso_officer.html =404;
  }

  location = /peso_admin {
    try_files /peso_admin.html =404;
  }

  location = /cswdo_officer {
    try_files /cswdo_officer.html =404;
  }

  location = /cswdo_admin {
    try_files /cswdo_admin.html =404;
  }

  location = /evaluator {
    try_files /evaluator.html =404;
  }

  location ~* \.html$ {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri.html =404;
  }
}

