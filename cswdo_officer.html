<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSWDO Officer Portal - Koronadal City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #F0B6C6;
            --primary-dark: #B88A9A;
            --primary-light: #F7D2DE;
            --primary-lighter: #FFEFF5;
            --border-color: #F7D2DE;
        }
        body {
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            background-color: #fbf6f8;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1, h2, h3, h4, h5, h6 {
            font-weight: 700 !important;
        }
        .placeholder-card {
            background-color: var(--primary-lighter);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(240, 182, 198, 0.08);
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: white;
            color: var(--primary-pink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 20px;
            border: 1px solid var(--border-color);
        }
        .btn-logout {
            background-color: var(--primary-pink);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn-logout:hover {
            background-color: var(--primary-dark);
            color: white;
        }
    </style>
</head>
<body>
    <div class="placeholder-card">
        <div class="icon-circle">
            <i class="bi bi-file-earmark-person"></i>
        </div>
        <h3 style="color: var(--primary-dark); font-weight: 700;">CSWDO Officer Portal</h3>
        <p class="text-muted mt-2 mb-4">
            Welcome, <strong><span id="officerNameDisplay">Case Worker</span></strong>! The Officer Portal case-assignment interface and interview recording system is initialized.
        </p>
        <div class="alert alert-info py-2" style="font-size: 0.9rem;">
            <i class="bi bi-info-circle me-1"></i> You are logged in with role: <strong>CSWDO Officer</strong>
        </div>
        <button class="btn-logout mt-3 w-100" onclick="logoutOfficer()">
            <i class="bi bi-box-arrow-left me-1"></i> Sign Out
        </button>
    </div>

    <script>
        // Basic role check
        const role = sessionStorage.getItem('userRole');
        if (role !== 'CSWDO Officer') {
            alert('Unauthorized Access. Redirecting to Staff Login Portal.');
            window.location.href = 'admin_login.html';
        }
        document.getElementById('officerNameDisplay').textContent = sessionStorage.getItem('username') || 'Case Worker';

        function logoutOfficer() {
            sessionStorage.clear();
            window.location.href = 'admin_login.html';
        }
    </script>
</body>
</html>
